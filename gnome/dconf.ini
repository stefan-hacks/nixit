##############################################################################
#
# GNOME Settings - Sanitized for Public Repository
#
# This file contains GNOME desktop settings without sensitive information.
# Import with: dconf load / < gnome/dconf.ini
#
##############################################################################

# ============================================================================
# GNOME Shell Extensions
# ============================================================================

[org/gnome/shell]
# Enabled extensions (non-sensitive list)
enabled-extensions=[
  'user-theme@gnome-shell-extensions.gcampax.github.com',
  'dash-to-dock@micxgx.gmail.com',
  'GPaste@gnome-shell-extensions.gnome.org',
  'blur-my-shell@aunetx',
  'clipboard-indicator@tudmotu.com',
  'notification-configurator@exposedcat',
  'pomodoro-timer@Oguzhankokulu.github.com',
  'openbar@neuromorph',
  'quick-settings-audio-panel@rayzeq.github.io',
  'quake-terminal@diegodario88.github.com',
  'dynamic-music-pill@andbal',
  'CoverflowAltTab@palatis.blogspot.com',
  'steal-my-focus-window@steal-my-focus-window',
  'Vitals@CoreCoding.com'
]

# Favorite apps (general list, no personal data)
favorite-apps=[
  'kitty.desktop',
  'org.gnome.Nautilus.desktop',
  'firefox.desktop',
  'org.gnome.Evolution.desktop',
  'org.gnome.TextEditor.desktop'
]

# Disabled extensions
disabled-extensions=[]
disable-user-extensions=false
disable-extension-version-validation=true

[org/gnome/shell/extensions/dash-to-dock]
apply-custom-theme=true
background-opacity=0.8
custom-theme-shrink=true
dash-max-icon-size=38
dock-position='BOTTOM'
height-fraction=0.65
intellihide-mode='ALL_WINDOWS'

[org/gnome/shell/extensions/blur-my-shell]
hacks-level=1
rounded-blur-found=false

[org/gnome/shell/extensions/clipboard-indicator]
blink-icon-on-copy=true
cache-size=20
clear-on-boot=true
history-size=20
move-item-first=true
notify-on-copy=true
regex-search=true
strip-text=true

[org/gnome/shell/extensions/quake-terminal]
always-on-top=true
animation-time=110
auto-hide-window=false
horizontal-size=95
render-on-primary-monitor=true
terminal-id='kitty.desktop'
terminal-shortcut=['<Control><Alt>q']

# ============================================================================
# Desktop Settings
# ============================================================================

[org/gnome/desktop/interface]
# Theme
accent-color='blue'
color-scheme='prefer-dark'
gtk-theme='Yaru-blue-dark'
icon-theme='Yaru-blue-dark'

# Fonts (generic, no personal data)
document-font-name='Sans 11'
font-name='Sans 11'
monospace-font-name='Monospace 11'

# Features
clock-show-weekday=true
enable-animations=true
overlay-scrolling=false
show-battery-percentage=true

[org/gnome/desktop/background]
# Background settings (paths will be set by user)
color-shading-type='solid'
picture-options='zoom'
primary-color='#000000000000'
secondary-color='#000000000000'

[org/gnome/desktop/screensaver]
color-shading-type='solid'
picture-options='zoom'
primary-color='#000000000000'
secondary-color='#000000000000'

[org/gnome/desktop/wm/preferences]
button-layout='close,minimize,maximize:appmenu'

[org/gnome/desktop/wm/keybindings]
# Window management
activate-window-menu=[]
begin-move=[]
begin-resize=[]
switch-to-workspace-left=['<Alt>F11']
switch-to-workspace-right=['<Alt>F12']
unmaximize=['<Super>Down']
move-to-monitor-left=['<Shift><Super>h']
move-to-monitor-right=['<Shift><Super>l']

[org/gnome/desktop/peripherals/mouse]
natural-scroll=true
speed=1.0

[org/gnome/desktop/peripherals/touchpad]
speed=1.0
two-finger-scrolling-enabled=true

[org/gnome/desktop/session]
idle-delay=900

[org/gnome/desktop/sound]
allow-volume-above-100-percent=true
event-sounds=true

[org/gnome/desktop/input-sources]
sources=[('xkb', 'us')]
xkb-options=[]

[org/gnome/desktop/lockdown]
disable-lock-screen=false

[org/gnome/desktop/notifications]
show-banners=true

# ============================================================================
# GNOME Apps
# ============================================================================

[org/gnome/nautilus/preferences]
default-folder-viewer='list-view'
search-filter-time-type='last_modified'

[org/gnome/nautilus/list-view]
default-column-order=['name', 'size', 'type', 'date_modified']
default-visible-columns=['name', 'size', 'type', 'date_modified']

[org/gnome/terminal/legacy/profiles:/:default]
background-color='rgb(30,30,30)'
bold-color-same-as-fg=true
bold-is-bright=true
cursor-blink-mode='on'
cursor-shape='ibeam'
font='Monospace 12'
foreground-color='rgb(250,250,250)'
use-system-font=false
use-theme-colors=false

[org/gnome/calendar]
active-view='month'

[org/gnome/calculator]
base=10
button-mode='basic'

# ============================================================================
# Media Keys
# ============================================================================

[org/gnome/settings-daemon/plugins/media-keys]
screen-brightness-down=['<Ctrl><Super>Down']
screen-brightness-up=['<Ctrl><Super>Up']
screensaver=['<Control><Alt><Super>l']
volume-down=['<Alt>F6']
volume-mute=['<Alt>F5']
volume-up=['<Alt>F7']
next=['<Control><Super>period']
play=['<Control><Super>slash']
previous=['<Control><Super>comma']

# ============================================================================
# Shell Keybindings
# ============================================================================

[org/gnome/shell/keybindings]
show-screenshot-ui=['<Alt>F9']
toggle-message-tray=['<Control>F2']
toggle-overview=['<Alt>o']
toggle-quick-settings=['<Control>F3']

[org/gnome/shell/weather]
automatic-location=false

# ============================================================================
# App Folders
# ============================================================================

[org/gnome/desktop/app-folders]
folder-children=['System', 'Utilities']

[org/gnome/desktop/app-folders/folders/System]
apps=[
  'org.gnome.baobab.desktop',
  'org.gnome.DiskUtility.desktop',
  'org.gnome.Logs.desktop',
  'org.gnome.tweaks.desktop',
  'org.gnome.SystemMonitor.desktop'
]
name='X-GNOME-Shell-System.directory'
translate=true

[org/gnome/desktop/app-folders/folders/Utilities]
apps=[
  'org.gnome.Evince.desktop',
  'org.gnome.FileRoller.desktop',
  'org.gnome.font-viewer.desktop',
  'org.gnome.Loupe.desktop'
]
name='X-GNOME-Shell-Utilities.directory'
translate=true

# ============================================================================
# Color/GTK Settings
# ============================================================================

[org/gtk/gtk4/settings/file-chooser]
date-format='regular'
location-mode='path-bar'
show-hidden=true
sort-column='name'
sort-directories-first=true
sort-order='ascending'
type-format='category'
view-type='list'

[org/gtk/settings/file-chooser]
date-format='regular'
location-mode='path-bar'
show-hidden=true
show-size-column=true
show-type-column=true
sort-column='name'
sort-order='ascending'
type-format='category'

# ============================================================================
# Power Settings
# ============================================================================

[org/gnome/settings-daemon/plugins/power]
power-button-action='interactive'
sleep-inactive-ac-timeout=1200
sleep-inactive-ac-type='suspend'

[org/gnome/mutter]
overlay-key='Super'

# ============================================================================
# End of Sanitized GNOME Settings
# ============================================================================
