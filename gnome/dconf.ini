##############################################################################
#
# GNOME Settings - Sanitized for Public Repository
#
# This file contains GNOME desktop settings without sensitive information.
# Import with: dconf load / < gnome/dconf.ini
#
##############################################################################

# ============================================================================
# GNOME Shell Extensions - Updated List
# ============================================================================

[org/gnome/shell]
# Enabled extensions (non-sensitive list)
enabled-extensions=['user-theme@gnome-shell-extensions.gcampax.github.com', 'dash-to-dock@micxgx.gmail.com', 'GPaste@gnome-shell-extensions.gnome.org', 'wifi-signal-plus@jalil.arfaoui.net', 'dash2dock-lite@icedman.github.com', 'arcmenu@arcmenu.com', 'appindicatorsupport@rgcjonas.gmail.com', 'blur-my-shell@aunetx', 'clipboard-indicator@tudmotu.com', 'notification-configurator@exposedcat', 'pomodoro-timer@Oguzhankokulu.github.com', 'quick-settings-audio-panel@rayzeq.github.io', 'quake-terminal@diegodario88.github.io', 'wallpicker@omarxkhalid.github.io', 'just-perfection-desktop@just-perfection', 'desktop-widgets@NiffirgkcaJ.github.io', 'modernclock@gnome-port', 'dynamic-music-pill@andbal', 'steal-my-focus-window@steal-my-focus-window', 'Vitals@CoreCoding.com', 'openbar@neuromorph']

# Favorite apps (general list, no personal data)
favorite-apps=['kitty.desktop', 'org.gnome.Nautilus.desktop', 'firefox.desktop', 'org.gnome.Evolution.desktop', 'org.gnome.TextEditor.desktop']

# Disabled extensions
disable-user-extensions=false
disable-extension-version-validation=true

# Always show log out button in system menu
always-show-log-out=true

[org/gnome/shell/extensions/dash-to-dock]
apply-custom-theme=true
background-opacity=0.8
custom-theme-shrink=true
dash-max-icon-size=38
dock-position='BOTTOM'
height-fraction=0.65
intellihide-mode='ALL_WINDOWS'

[org/gnome/shell/extensions/dash2dock-lite]
# Minimal settings for dash2dock-lite

[org/gnome/shell/extensions/arcmenu]
arcmenu-hotkey=['<Control>F1']
menu-layout='Whisker'
menu-button-icon='Distro_Icon'

[org/gnome/shell/extensions/appindicator]
icon-brightness=0.0
icon-contrast=0.0
icon-opacity=240
icon-saturation=0.0
tray-pos='left'

[org/gnome/shell/extensions/blur-my-shell]
hacks-level=1
rounded-blur-found=false

[org/gnome/shell/extensions/clipboard-indicator]
blink-icon-on-copy=true
cache-size=20
clear-on-boot=true
history-size=20
move-item-first=true
notify-on-copy=true
regex-search=true
strip-text=true

[org/gnome/shell/extensions/quake-terminal]
always-on-top=true
animation-time=110
auto-hide-window=false
horizontal-size=95
render-on-primary-monitor=true
terminal-id='kitty.desktop'
terminal-shortcut=['<Control><Alt>q']

[org/gnome/shell/extensions/just-perfection]
# Just Perfection extension settings

[org/gnome/shell/extensions/user-theme]
# User theme extension - using default Adwaita

# ============================================================================
# Desktop Settings - Updated
# ============================================================================

[org/gnome/desktop/interface]
# Theme - Using GNOME defaults (Adwaita)
accent-color='teal'
color-scheme='prefer-dark'
gtk-theme='Adwaita'
icon-theme='Adwaita'

# Fonts - Using Hack Nerd Font
document-font-name='Hack Nerd Font 11'
font-name='Hack Nerd Font 11'
monospace-font-name='Hack Nerd Font Mono 11'

# Features
clock-show-weekday=true
enable-animations=false
overlay-scrolling=false
show-battery-percentage=true

[org/gnome/desktop/background]
# Background settings (paths will be set by user)
color-shading-type='solid'
picture-options='zoom'
primary-color='#000000000000'
secondary-color='#000000000000'

[org/gnome/desktop/screensaver]
color-shading-type='solid'
picture-options='zoom'
primary-color='#000000000000'
secondary-color='#000000000000'

[org/gnome/desktop/wm/preferences]
button-layout='close,minimize,maximize:appmenu'

[org/gnome/desktop/wm/keybindings]
# Window management
close=['<Alt>F4']
cycle-group=['<Control><Alt>Escape']
cycle-group-backward=['<Shift><Control><Alt>Escape']
cycle-windows=['<Alt>Escape']
cycle-windows-backward=['<Shift><Alt>Escape']
maximize=['<Super>Up']
minimize=['<Super>h']
move-to-monitor-down=['<Super><Shift>Down']
move-to-monitor-left=['<Shift><Super>h']
move-to-monitor-right=['<Shift><Super>l']
move-to-monitor-up=['<Super><Shift>Up']
move-to-workspace-1=['<Super><Shift>Home']
move-to-workspace-down=['<Control><Shift><Alt>Down']
move-to-workspace-last=['<Super><Shift>End']
move-to-workspace-left=['<Super><Shift>Page_Up', '<Super><Shift>KP_Prior', '<Super><Shift><Alt>Left', '<Control><Shift><Alt>Left']
move-to-workspace-right=['<Super><Shift>Page_Down', '<Super><Shift>KP_Next', '<Super><Shift><Alt>Right', '<Control><Shift><Alt>Right']
move-to-workspace-up=['<Control><Shift><Alt>Up']
panel-run-dialog=['<Alt>F2']
switch-applications=['<Super>Tab', '<Alt>Tab']
switch-applications-backward=['<Shift><Super>Tab', '<Shift><Alt>Tab']
switch-group=['<Super>Above_Tab', '<Alt>Above_Tab']
switch-group-backward=['<Shift><Super>Above_Tab', '<Shift><Alt>Above_Tab']
switch-input-source=['<Super>space', 'XF86Keyboard']
switch-input-source-backward=['<Shift><Super>space', '<Shift>XF86Keyboard']
switch-panels=['<Control><Alt>Tab']
switch-panels-backward=['<Shift><Control><Alt>Tab']
switch-to-workspace-1=['<Super>Home']
switch-to-workspace-down=['<Control><Alt>Down']
switch-to-workspace-last=['<Super>End']
switch-to-workspace-left=['<Alt>F11']
switch-to-workspace-right=['<Alt>F12']
switch-to-workspace-up=['<Control><Alt>Up']
toggle-maximized=['<Alt>F10']
unmaximize=['<Super>Down']

[org/gnome/desktop/peripherals/mouse]
natural-scroll=true
speed=1.0

[org/gnome/desktop/peripherals/touchpad]
speed=1.0
two-finger-scrolling-enabled=true

[org/gnome/desktop/session]
idle-delay=900

[org/gnome/desktop/sound]
allow-volume-above-100-percent=true
event-sounds=true

[org/gnome/desktop/input-sources]
sources=[('xkb', 'us'), ('xkb', 'gb')]

[org/gnome/desktop/lockdown]
disable-lock-screen=false

[org/gnome/desktop/notifications]
show-banners=true

[org/gnome/desktop/search-providers]
sort-order=['org.gnome.Settings.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Contacts.desktop', 'org.gnome.Calendar.desktop', 'org.gnome.Software.desktop', 'org.gnome.seahorse.Application.desktop', 'org.gnome.Calculator.desktop', 'org.gnome.Characters.desktop', 'org.gnome.clocks.desktop']

# ============================================================================
# GNOME Apps
# ============================================================================

[org/gnome/nautilus/preferences]
default-folder-viewer='list-view'
search-filter-time-type='last_modified'

[org/gnome/nautilus/list-view]
default-column-order=['name', 'size', 'type', 'date_modified']
default-visible-columns=['name', 'size', 'type', 'date_modified']

[org/gnome/terminal/legacy/profiles:/:default]
background-color='rgb(30,30,30)'
bold-color-same-as-fg=true
bold-is-bright=true
cursor-blink-mode='on'
cursor-shape='ibeam'
font='Monospace 12'
foreground-color='rgb(250,250,250)'
use-system-font=false
use-theme-colors=false

[org/gnome/calendar]
active-view='month'

[org/gnome/calculator]
base=10
button-mode='basic'

# ============================================================================
# Media Keys
# ============================================================================

[org/gnome/settings-daemon/plugins/media-keys]
screen-brightness-down=['<Ctrl><Super>Down']
screen-brightness-up=['<Ctrl><Super>Up']
screensaver=['<Control><Alt><Super>l']
volume-down=['<Alt>F6']
volume-mute=['<Alt>F5']
volume-up=['<Alt>F7']
next=['<Control><Super>period']
play=['<Control><Super>slash']
previous=['<Control><Super>comma']

# ============================================================================
# Shell Keybindings
# ============================================================================

[org/gnome/shell/keybindings]
show-screenshot-ui=['<Alt>F9']
toggle-message-tray=['<Control>F2']
toggle-overview=['<Alt>o']
toggle-quick-settings=['<Control>F3']
focus-active-notification=['<Super>n']
toggle-application-view=['<Super>a']
open-new-window-application-1=['<Super><Control>1']
open-new-window-application-2=['<Super><Control>2']
open-new-window-application-3=['<Super><Control>3']
open-new-window-application-4=['<Super><Control>4']
open-new-window-application-5=['<Super><Control>5']
open-new-window-application-6=['<Super><Control>6']
open-new-window-application-7=['<Super><Control>7']
open-new-window-application-8=['<Super><Control>8']
open-new-window-application-9=['<Super><Control>9']
screen-brightness-cycle=['XF86MonBrightnessCycle']
screen-brightness-down=['<Ctrl><Super>Down']
screen-brightness-up=['<Ctrl><Super>Up']
screenshot=['<Shift>Print']
screenshot-window=['<Alt>Print']
show-screen-recording-ui=['<Ctrl><Shift><Alt>R']
switch-to-application-1=['<Super>1']
switch-to-application-2=['<Super>2']
switch-to-application-3=['<Super>3']
switch-to-application-4=['<Super>4']
switch-to-application-5=['<Super>5']
switch-to-application-6=['<Super>6']
switch-to-application-7=['<Super>7']
switch-to-application-8=['<Super>8']
switch-to-application-9=['<Super>9']

[org/gnome/shell/weather]
automatic-location=false

# ============================================================================
# App Folders - Updated
# ============================================================================

[org/gnome/desktop/app-folders]
folder-children=['System', 'Utilities']

[org/gnome/desktop/app-folders/folders/System]
apps=['org.gnome.baobab.desktop', 'org.gnome.DiskUtility.desktop', 'org.gnome.Logs.desktop', 'org.gnome.tweaks.desktop', 'org.gnome.SystemMonitor.desktop']
name='X-GNOME-Shell-System.directory'
translate=true

[org/gnome/desktop/app-folders/folders/Utilities]
apps=['org.gnome.Evince.desktop', 'org.gnome.FileRoller.desktop', 'org.gnome.font-viewer.desktop', 'org.gnome.Loupe.desktop']
name='X-GNOME-Shell-Utilities.directory'
translate=true

# ============================================================================
# Color/GTK Settings
# ============================================================================

[org/gtk/gtk4/settings/file-chooser]
date-format='regular'
location-mode='path-bar'
show-hidden=true
sort-column='name'
sort-directories-first=true
sort-order='ascending'
type-format='category'
view-type='list'

[org/gtk/settings/file-chooser]
date-format='regular'
location-mode='path-bar'
show-hidden=true
show-size-column=true
show-type-column=true
sort-column='name'
sort-order='ascending'
type-format='category'

# ============================================================================
# Power Settings
# ============================================================================

[org/gnome/settings-daemon/plugins/power]
power-button-action='interactive'
sleep-inactive-ac-timeout=1200
sleep-inactive-ac-type='suspend'

[org/gnome/mutter]
overlay-key='Super'

[org/gnome/mutter/keybindings]
cancel-input-capture=['<Super><Shift>Escape']
rotate-monitor=['XF86RotateWindows']
switch-monitor=['<Super>p', 'XF86Display']
toggle-tiled-left=['<Super>Left']
toggle-tiled-right=['<Super>Right']

# ============================================================================
# End of Sanitized GNOME Settings
# ============================================================================
